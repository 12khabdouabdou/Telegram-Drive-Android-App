name: Build APK

# Builds TDLib from source for 4 ABIs, then assembles the debug APK,
# then uploads it as a downloadable artifact attached to the workflow run.
#
# Telegram API credentials are NOT needed at build time — they are entered
# by the user inside the app at first-launch onboarding and stored encrypted
# on-device. The same APK works for any user's credentials.
#
# First run: ~25-30 minutes (TDLib compilation across 4 ABIs).
# Subsequent runs: ~5-8 minutes (cached TDLib .so files).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # manual trigger from the Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            cmake;3.22.1
            ndk;26.3.11579264

      - name: Cache TDLib build outputs
        uses: actions/cache@v4
        id: tdlib-cache
        with:
          path: app/src/main/jniLibs
          key: tdlib-${{ runner.os }}-v1.8.20-${{ hashFiles('scripts/build-tdlib-android.sh') }}

      - name: Checkout TDLib source
        if: steps.tdlib-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          ref: v1.8.20
          path: tdlib-src

      - name: Build TDLib for Android (4 ABIs)
        if: steps.tdlib-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/build-tdlib-android.sh
          ./scripts/build-tdlib-android.sh
        env:
          ANDROID_NDK_HOME: $ANDROID_HOME/ndk/26.3.11579264
          ANDROID_NDK_ROOT: $ANDROID_HOME/ndk/26.3.11579264
          TDLIB_SRC_DIR: $GITHUB_WORKSPACE/tdlib-src
          TDLIB_OUT_DIR: $GITHUB_WORKSPACE/app/src/main/jniLibs

      - name: Generate local.properties (sdk.dir only — no API credentials needed at build time)
        run: |
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          EOF

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-drive-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Print artifact download URL
        run: |
          echo "::notice::APK built! Download it from:"
          echo "::notice::https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "::notice::Look for the 'telegram-drive-debug-apk' artifact at the bottom of the run page."
          echo "::notice::On first launch, the app will ask you to enter your Telegram API credentials (from my.telegram.org/apps)."
