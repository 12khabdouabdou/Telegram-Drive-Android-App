name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 cmake;3.22.1 ndk;26.3.11579264'

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf zlib1g-dev zlib1g-dev:i386 libssl-dev

      - name: Print environment
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME/ndk/" || true

      - name: Cache TDLib build outputs
        uses: actions/cache@v4
        id: tdlib-cache
        with:
          path: |
            app/src/main/jniLibs
            app/libs/tdlib-java.jar
          key: tdlib-1.8.0-v2-${{ hashFiles('scripts/build-tdlib-android.sh') }}

      - name: Checkout TDLib source
        if: steps.tdlib-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          ref: v1.8.0
          path: tdlib-src

      - name: Build TDLib for Android (4 ABIs)
        if: steps.tdlib-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/build-tdlib-android.sh
          ./scripts/build-tdlib-android.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
          TDLIB_SRC_DIR: ${{ github.workspace }}/tdlib-src
          TDLIB_OUT_DIR: ${{ github.workspace }}/app/src/main/jniLibs
          TDLIB_JAR_OUT: ${{ github.workspace }}/app/libs/tdlib-java.jar

      - name: Verify TDLib outputs
        run: |
          find app/src/main/jniLibs -type f -name '*.so' -exec ls -lh {} \;
          ls -lh app/libs/tdlib-java.jar || exit 1

      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-drive-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Print download URL
        run: |
          echo "::notice::APK built! Download from:"
          echo "::notice::https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
