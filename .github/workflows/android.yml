name: Android Native Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Core Rust Library
        run: |
          cd crates/core
          cargo ndk -t arm64-v8a -o ../../android/app/src/main/jniLibs build --release

      - name: Generate UniFFI Bindings
        run: |
          cd crates/core
          cargo run --bin uniffi-bindgen generate src/telegram_drive.udl --language kotlin --out-dir ../../android/app/src/main/java/com/cameronamer/telegramdrive/generated

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
