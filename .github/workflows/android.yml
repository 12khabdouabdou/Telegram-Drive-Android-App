name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653" "build-tools;33.0.0" "platforms;android-33"

      - name: Set Environment Variables
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        working-directory: app
        run: npm install

      - name: Initialize Tauri Android
        working-directory: app
        run: npm run tauri android init

      - name: Patch AndroidManifest for Auto-Backup
        working-directory: app/src-tauri/gen/android/app/src/main
        run: |
          sed -i '/<uses-permission android:name="android.permission.INTERNET"/a \
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE" \/>\n\
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" \/>\n\
          <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>\n\
          <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" \/>\n\
          <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" \/>\n\
          <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" \/>' AndroidManifest.xml
          
          sed -i '/<\/application>/i \
          <service android:name=".AutoBackupService" android:foregroundServiceType="dataSync" android:exported="false" \/>' AndroidManifest.xml
          
          # Add Intent Filter to MainActivity for Share to App
          sed -i '/<activity android:name=".MainActivity"/,/<\/activity>/ s/<\/activity>/\
            <intent-filter>\
                <action android:name="android.intent.action.SEND" \/>\
                <category android:name="android.intent.category.DEFAULT" \/>\
                <data android:mimeType="*\/*" \/>\
            <\/intent-filter>\
            <intent-filter>\
                <action android:name="android.intent.action.SEND_MULTIPLE" \/>\
                <category android:name="android.intent.category.DEFAULT" \/>\
                <data android:mimeType="*\/*" \/>\
            <\/intent-filter>\
          <\/activity>/' AndroidManifest.xml

      - name: Build Android APK
        working-directory: app
        run: npm run tauri android build

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release.keystore -alias androidkey -storepass android123 -keypass android123 -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=TelegramDrive, CN=TelegramDrive"
          $ANDROID_HOME/build-tools/33.0.0/apksigner sign --ks release.keystore --ks-pass pass:android123 --key-pass pass:android123 --in app/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk --out app-universal-release-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Drive-Signed-APK
          path: app-universal-release-signed.apk
          if-no-files-found: warn
